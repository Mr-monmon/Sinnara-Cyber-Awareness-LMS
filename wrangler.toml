"$schema" = "./node_modules/wrangler/config-schema.json"

name = "awareone"
main = "src/worker.ts"
compatibility_date = "2026-04-09"

# Build is performed by GitHub Actions before `wrangler deploy` runs.
# Do NOT add a [build] command here — Wrangler would rebuild without the
# VITE_* secrets and ship an unconfigured bundle.

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/*"]
