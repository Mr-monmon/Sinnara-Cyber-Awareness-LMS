name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy edge functions
        run: |
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            # skip shared/utility folders
            [[ "$name" == _* ]] && continue
            echo "::group::Deploying $name"
            supabase functions deploy "$name" --project-ref "$PROJECT_REF"
            echo "::endgroup::"
          done
