# Public landing-page host for phishing campaigns — recipients reach this with no
# auth. Tenant scoping is enforced inside the function (campaign ↔ landing page ↔
# recipient must all match), so verify_jwt is intentionally disabled here.
[functions.serve-landing-page]
enabled = true
verify_jwt = false
entrypoint = "./functions/serve-landing-page/index.ts"

# Public tracking endpoint for phishing recipients (open pixel, click redirect,
# report, form submit). Recipients are unauthenticated, so JWT verification is
# intentionally disabled. The function validates the campaign/recipient tokens
# itself and never exposes campaign data. Admin functions (process-campaign,
# process-scheduled-campaigns, launch-phishing-campaign, create-campaign-from-request,
# save-smtp-profile, clone-landing-page) are NOT listed here and therefore keep
# Supabase's default verify_jwt = true. process-campaign and process-scheduled-campaigns
# are invoked by pg_cron with the service-role key (a valid project JWT), while
# launch-phishing-campaign and create-campaign-from-request are invoked by admins
# with their own session JWT.
[functions.phishing-track]
enabled = true
verify_jwt = false
entrypoint = "./functions/phishing-track/index.ts"
